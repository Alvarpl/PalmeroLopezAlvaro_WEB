     <select id="menu" class="dropdown-bonito" onchange="cambiarTexto()">
<option value="">Información</option>
<option value="op1">Inscripción</option>
<option value="op2">Apartados</option>
<option value="op3">Premios</option>
</select>

<div id="contenido" class="despegable-de-7-apartados"></div>

<script>
function cambiarTexto() {

    var opcion = document.getElementById("menu").value;
    var texto = document.getElementById("contenido");

    if(opcion == ""){
        texto.innerHTML = "";
        texto.classList.remove("mostrar-texto");
        return;
    }

    if(opcion == "op1"){
        texto.innerHTML = "El plazo de inscripción será del 10/08/2026 a 22/09/2026.<br><br>Para presentar el corto se tendrá que rellenar el siguiente formulario con los datos requeridos.";
    }

    if(opcion == "op2"){
        texto.innerHTML = "Este año contamos con 3 categorías, dos dedicadas al Stop Motion y una tercera de carácter libre.<br><br>Los cortos deberán tener una duración de entre 5 y 20 minutos (sin contar créditos).";
    }

    if(opcion == "op3"){
        texto.innerHTML = "Cada sección será premiada con 200€ al ganador, que será elegido por el jurado proporcionado por el centro.";
    }

    texto.classList.add("mostrar-texto");
}
</script>
